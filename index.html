<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gaming Mod - Private Access</title>
    <style>
        :root {
            --primary-color: #00f2ff; /* Neon Blue */
            --accent-color: #7000ff;  /* Deep Purple */
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Luxury Background Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0c 100%);
            z-index: -1;
        }

        .header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            background: rgba(22, 22, 26, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            max-width: 800px;
            width: 90%;
            margin-top: 50px;
            text-align: center;
        }

        .hero-title {
            font-size: 42px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .status-badge {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--primary-color);
            display: inline-block;
            margin-bottom: 30px;
        }

        .mod-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .input-group {
            margin: 25px 0;
        }

        input[type="text"] {
            width: 80%;
            padding: 15px;
            background: #0d0d0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .execute-btn {
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            border: none;
            padding: 18px 45px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(112, 0, 255, 0.4);
        }

        .execute-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.6);
        }

        /* Injection Simulation Overlay */
        #injection-panel {
            display: none;
            margin-top: 20px;
            text-align: left;
            background: #000;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            color: #00ff00;
        }

        .trust-section {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">EliteMods Private</div>
</div>

<div class="main-container">
    <div class="status-badge">● SERVER STATUS: ONLINE (US/UK CLOUD)</div>
    <h1 class="hero-title">Unlock Premium Mod Assets</h1>
    <p>Secure, Anti-Ban Encryption, and Instant Injection for US & UK Verified Accounts.</p>

    <div class="mod-card">
        <div class="input-group">
            <input type="text" id="username" placeholder="Enter Game ID or Email...">
        </div>
        <button class="execute-btn" onclick="startInjection()">Initialize Injection</button>

        <div id="injection-panel"></div>
    </div>

    <div class="trust-section">
        <span>AES-256 Secured</span>
        <span>No Human Verification Needed*</span>
        <span>Anti-Ban v9.2</span>
    </div>
</div>

<script>
    function startInjection() {
        const user = document.getElementById('username').value;
        if(!user) return alert('Enter ID first');
        
        const panel = document.getElementById('injection-panel');
        panel.style.display = 'block';
        const lines = [
            "> Connecting to secure gaming server...",
            "> User " + user + " identified...",
            "> Fetching US/UK specific mod bundles...",
            "> Bypassing server-side verification...",
            "> Injecting assets into local cache...",
            "> STATUS: FINALIZING... REDIRECTING FOR ACCESS..."
        ];

        let i = 0;
        const interval = setInterval(() => {
            panel.innerHTML += lines[i] + "<br>";
            i++;
            if(i >= lines.length) {
                clearInterval(interval);
                setTimeout(() => {
                    // هنا تضع رابط الـ CPA الخاص بك
                    window.location.href = "YOUR_CPA_LINK_HERE";
                }, 1500);
            }
        }, 800);
    }
</script>

</body>
</html>
