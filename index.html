<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>50,000 جوهرة مجاناً - Free Fire • PUBG • Roblox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
    
    body { font-family: 'Bebas Neue', sans-serif; }
    .neon-glow { text-shadow: 0 0 25px #22ff88, 0 0 50px #22ff88; }
    .neon-btn {
      background: linear-gradient(90deg, #00ff9d, #00cc77);
      box-shadow: 0 0 40px #00ff9d;
      transition: all 0.4s;
    }
    .neon-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 0 70px #00ff9d;
    }
    .live { animation: livePulse 1.5s infinite; }
    @keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body class="bg-black text-white">

  <!-- Urgent Bar -->
  <div class="bg-red-600 py-3 text-center font-bold text-lg tracking-wider">
    🔥 1,847 لاعب يحصلون على المكافآت الآن - آخر 23 مكافأة فقط!
  </div>

  <!-- Hero -->
  <section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-zinc-950 to-black relative">
    <div class="max-w-5xl mx-auto text-center px-6">
      <div class="flex justify-center mb-6">
        <span class="bg-green-500/10 text-green-400 border border-green-500 px-6 py-2 rounded-full flex items-center gap-3 text-xl">
          <span class="relative flex h-4 w-4">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-4 w-4 bg-green-500 live"></span>
          </span>
          LIVE: 2,394 يشاهدون الآن
        </span>
      </div>

      <h1 class="text-6xl md:text-7xl font-black neon-glow leading-none mb-6">
        احصل على <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-green-400">50,000 جوهرة + UC + Robux</span><br>
        <span class="text-5xl text-red-500">مجاناً قبل نفاذ الكمية</span>
      </h1>

      <p class="text-2xl text-gray-300 mb-10">Free Fire • PUBG Mobile • Roblox • Mobile Legends • COD</p>

      <!-- Countdown -->
      <div class="bg-zinc-900 border-2 border-red-600 rounded-3xl p-8 mb-10 inline-block">
        <p class="text-red-500 uppercase tracking-widest text-sm mb-3">العرض ينتهي خلال:</p>
        <div id="countdown" class="flex justify-center gap-8 text-5xl font-bold"></div>
      </div>

      <button onclick="claimNow()" 
              class="neon-btn text-black text-4xl font-black px-20 py-7 rounded-3xl shadow-2xl flex items-center gap-4 mx-auto hover:bg-green-400">
        <i class="fas fa-gift text-4xl"></i>
        أطلب المكافآت الآن - فوري
      </button>

      <p class="mt-8 text-green-400 text-xl font-bold">✅ مضمون • ✅ بدون تحقق • ✅ يصل فوراً</p>
    </div>
  </section>

  <script>
    // Tailwind Script
    tailwind.config = {
      content: [],
      theme: {
        extend: {}
      }
    }

    // Countdown Timer (15 دقيقة - أقوى تأثير نفسي)
    let timeLeft = 15 * 60;
    const countdownEl = document.getElementById('countdown');

    function updateCountdown() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      countdownEl.innerHTML = `
        <div class="text-center">
          <span class="text-6xl text-red-500">${minutes.toString().padStart(2, '0')}</span>
          <span class="block text-xs text-gray-400 -mt-1">دقيقة</span>
        </div>
        <div class="text-6xl text-white">:</div>
        <div class="text-center">
          <span class="text-6xl text-red-500">${seconds.toString().padStart(2, '0')}</span>
          <span class="block text-xs text-gray-400 -mt-1">ثانية</span>
        </div>
      `;
      if (timeLeft > 0) timeLeft--;
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    // Claim Function
    function claimNow() {
      const btn = event.target.closest('button');
      const originalText = btn.innerHTML;
      
      btn.style.transition = "all 0.4s";
      btn.innerHTML = `
        <i class="fas fa-spinner fa-spin mr-3"></i>
        جاري الاتصال بالسيرفر...
      `;
      
      setTimeout(() => {
        btn.innerHTML = `✅ تم الإرسال! تحقق من اللعبة الآن`;
        btn.style.background = "linear-gradient(90deg, #22c55e, #86efac)";
        
        setTimeout(() => {
          alert("🎉 تم إرسال المكافآت بنجاح!\nافتح اللعبة خلال 5 دقائق لاستلام الجواهر والـ UC.");
          btn.innerHTML = originalText;
          btn.style.background = "";
        }, 2500);
      }, 2200);
    }

    console.log('%cBlackhat Gaming Landing Page v2026 - FIXED & OPTIMIZED', 'color:#00ff9d; font-size:14px; font-weight:bold');
  </script>
</body>
</html>
